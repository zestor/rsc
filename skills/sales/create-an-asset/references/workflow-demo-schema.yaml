# Workflow / Architecture Demo Data Model

# Component types: human, document, ai, database, api, middleware, output
component:
  id: 'snowflake'
  label: 'Snowflake Data Warehouse'
  type: 'database'
  icon: 'database'
  description: 'Financial performance data'
  brand_color: '#29B5E8'

# Flow step definition
step:
  number: 1
  from: 'human'
  to: 'claude'
  action: 'Initiates performance review'
  description: 'Sarah, a Brand Analyst at [Prospect], kicks off the quarterly review...'
  data_example: 'Review request: Nike brand, Q4 2025'
  duration: '~1 second'
  value_note: 'No manual data gathering required'

# Complexity-based structure
# Simple (3-5 components): single-view diagram with step annotations
# Medium (5-10 components): zoomable canvas with step-by-step walkthrough
# Complex (10+ components): multi-layer view (overview -> detailed) with guided tour

# Standard elements:
# 1. Title bar: [Scenario Name] - Powered by [Seller Product]
# 2. Component nodes: visual boxes/icons for each system
# 3. Flow arrows: animated connections showing data movement
# 4. Step panel: sidebar explaining current step in plain language
# 5. Controls: Play / Pause / Step Forward / Step Back / Reset
# 6. Annotations: callouts for key decision points
# 7. Data preview: sample payloads at each step
